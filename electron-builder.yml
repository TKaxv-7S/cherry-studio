appId: com.kangfenmao.CherryStudio
productName: Cherry Studio
electronLanguages:
  - zh-CN
  - zh-TW
  - en-US
  - ja # macOS/linux/win
  - ru # macOS/linux/win
  - zh_CN # for macOS
  - zh_TW # for macOS
  - en # for macOS
  - de
directories:
  buildResources: build

protocols:
  - name: Cherry Studio
    schemes:
      - cherrystudio
files:
  - "**/*"
  - "!**/{.vscode,.yarn,.yarn-lock,.github,.cursorrules,.prettierrc}"
  - "!electron.vite.config.{js,ts,mjs,cjs}}"
  - "!.*"
  - "!components.json"
  - "!**/{.eslintignore,.eslintrc.js,.eslintrc.json,.eslintcache,root.eslint.config.js,eslint.config.js,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,eslint.config.mjs,dev-app-update.yml,CHANGELOG.md,README.md,biome.jsonc}"
  - "!**/{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!**/{tsconfig.json,tsconfig.tsbuildinfo,tsconfig.node.json,tsconfig.web.json}"
  - "!**/{.editorconfig,.jekyll-metadata}"
  - "!src"
  - "!config"
  - "!patches"
  - "!app-upgrade-config.json"
  - "!**/node_modules/**/*.cpp"
  - "!**/node_modules/node-addon-api/**"
  - "!**/node_modules/prebuild-install/**"
  - "!scripts"
  - "!local"
  - "!docs"
  - "!packages"
  - "!.swc"
  - "!.bin"
  - "!._*"
  - "!*.log"
  - "!stats.html"
  - "!*.md"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!**/*.{map,ts,tsx,jsx,less,scss,sass,css.d.ts,d.cts,d.mts,md,markdown,yaml,yml}"
  - "!**/{test,tests,__tests__,powered-test,coverage}/**"
  - "!**/{example,examples}/**"
  - "!**/*.{spec,test}.{js,jsx,ts,tsx}"
  - "!**/*.min.*.map"
  - "!**/*.d.ts"
  - "!**/dist/es6/**"
  - "!**/dist/demo/**"
  - "!**/amd/**"
  - "!**/{.DS_Store,Thumbs.db,thumbs.db,__pycache__}"
  - "!**/{LICENSE,license,LICENSE.*,*.LICENSE.txt,NOTICE.txt,README.md,readme.md,CHANGELOG.md}"
  - "!node_modules/rollup-plugin-visualizer"
  - "!node_modules/js-tiktoken"
  - "!node_modules/@tavily/core/node_modules/js-tiktoken"
  - "!node_modules/pdf-parse/lib/pdf.js/{v1.9.426,v1.10.88,v2.0.550}"
  - "!node_modules/mammoth/{mammoth.browser.js,mammoth.browser.min.js}"
  - "!node_modules/selection-hook/prebuilds/**/*" # we rebuild .node, don't use prebuilds
  - "!node_modules/selection-hook/node_modules" # we don't need what in the node_modules dir
  - "!node_modules/selection-hook/src" # we don't need source files
  - "!node_modules/tesseract.js-core/{tesseract-core.js,tesseract-core.wasm,tesseract-core.wasm.js}" # we don't need source files
  - "!node_modules/tesseract.js-core/{tesseract-core-lstm.js,tesseract-core-lstm.wasm,tesseract-core-lstm.wasm.js}" # we don't need source files
  - "!node_modules/tesseract.js-core/{tesseract-core-simd-lstm.js,tesseract-core-simd-lstm.wasm,tesseract-core-simd-lstm.wasm.js}" # we don't need source files
  - "!**/*.{h,iobj,ipdb,tlog,recipe,vcxproj,vcxproj.filters,Makefile,*.Makefile}" # filter .node build files
asarUnpack:
  - out/proxy/**
  - resources/**
  - "**/*.{metal,exp,lib}"
  - "node_modules/@img/sharp-libvips-*/**"

win:
  executableName: Cherry Studio
  artifactName: ${productName}-${version}-${arch}-setup.${ext}
  target:
    - target: nsis
    - target: portable
  signtoolOptions:
    sign: scripts/win-sign.js
  verifyUpdateCodeSignature: false
nsis:
  artifactName: ${productName}-${version}-${arch}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  allowToChangeInstallationDirectory: true
  oneClick: false
  include: build/nsis-installer.nsh
  buildUniversalInstaller: false
  differentialPackage: false
portable:
  artifactName: ${productName}-${version}-${arch}-portable.${ext}
  buildUniversalInstaller: false
mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  artifactName: ${productName}-${version}-${arch}.${ext}
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  target:
    - target: dmg
    - target: zip
dmg:
  writeUpdateInfo: false
linux:
  artifactName: ${productName}-${version}-${arch}.${ext}
  executableName: CherryStudio
  target:
    - target: AppImage
    - target: deb
    - target: rpm
  maintainer: electronjs.org
  category: Utility
  desktop:
    entry:
      Name: Cherry Studio
      StartupWMClass: CherryStudio
  mimeTypes:
    - x-scheme-handler/cherrystudio
rpm:
  # Workaround for electron build issue on rpm package:
  # https://github.com/electron/forge/issues/3594
  fpm: ["--rpm-rpmbuild-define=_build_id_links none"]
publish:
  provider: generic
  url: https://releases.cherry-ai.com
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
beforePack: scripts/before-pack.js
afterPack: scripts/after-pack.js
afterSign: scripts/notarize.js
artifactBuildCompleted: scripts/artifact-build-completed.js
releaseInfo:
  releaseNotes: |
    <!--LANG:en-->
    Cherry Studio 1.9.0 - Major Agent & AI Enhancements

    ✨ New Features
    - [Agents] Add CherryClaw autonomous agent type with personality-driven scheduling, Telegram integration, and sandbox mode
    - [Agents] Add terminal-style syntax highlighting for shell tool outputs (Bash, Grep, Glob)
    - [MCP] Add flomo as a built-in MCP server for capturing notes and ideas via AI
    - [Agents] Integrate rtk to reduce token consumption by 60-90% for shell commands
    - [Agents] Improved tool rendering: syntax-highlighted diffs with unified/split toggle, line numbers, and material file type icons
    - [Topics] Respect pinTopicsToTop setting in Topics list
    - [Models] Add endpoint option for aionly provider and update default models
    - [ErrorHandling] Add AI-powered error diagnosis with automatic classification, translation, and guided resolution

    🐛 Bug Fixes
    - [Models] Fix new-api provider using configured host for Anthropic format requests
    - [Agents] Fix Claude Code sessions respecting proxy settings for child processes
    - [Agents] Validate working directory before launching code tool
    - [Knowledge] Fix epub embedding failure by migrating to v2 async API
    - [Notes] Fix KaTeX backslash corruption when toggling editor modes
    - [Thinking] Fix thinking time display race condition
    - [Models] Fix Poe provider model loading and update default models
    - [Models] Fix kimi-cli crash when uv binary is not found
    - [Models] Fix invalid env variable names for providers with dots in name (e.g., z.ai)
    - [Models] Fix NVIDIA provider reasoning parameters for Qwen/DeepSeek/Kimi/Zhipu models
    - [Models] Fix Google Gemini web search for models fetched from Google API
    - [Models] Fix Qwen3.5 model detection to support 3.9 series
    - [Updater] Fallback to latest channel when test channel is null
    - [Backup] Fix backup file size regression (now uses minimal compression)

    💄 Improvements
    - [UI] Fix macOS traffic light alignment in custom title bar

    ⚡ Performance
    - [Backup] Optimize backup compression level for faster backups

    <!--LANG:zh-CN-->
    Cherry Studio 1.9.0 - 重大智能体和 AI 增强功能

    ✨ 新功能
    - [智能体] 新增 CherryClaw 自主智能体类型，支持个性化调度、Telegram 集成和沙箱模式
    - [智能体] 为 shell 工具输出添加终端风格语法高亮（Bash、Grep、Glob）
    - [MCP] 新增 flomo 内置 MCP 服务器，支持通过 AI 捕捉笔记和灵感
    - [智能体] 集成 rtk，将 shell 命令的 token 消耗减少 60-90%
    - [智能体] 改进工具渲染：语法高亮差异视图（统一/分屏切换）、行号和材质文件类型图标
    - [话题] 话题列表支持置顶设置
    - [模型] 为 aionly 提供商添加端点选项并更新默认模型
    - [错误处理] 新增 AI 驱动的错误诊断，支持自动分类、翻译和引导式解决方案

    🐛 问题修复
    - [模型] 修复 new-api 提供商在 Anthropic 格式请求时未使用配置主机的问题
    - [智能体] 修复 Claude Code 会话子进程未遵守代理设置的问题
    - [智能体] 启动代码工具前验证工作目录
    - [知识库] 修复 epub 嵌入失败问题（迁移到 v2 异步 API）
    - [笔记] 修复切换编辑器模式时 KaTeX 反斜杠损坏的问题
    - [思考] 修复思考时间显示竞态条件
    - [模型] 修复 Poe 提供商模型加载问题并更新默认模型
    - [模型] 修复 kimi-cli 在找不到 uv 二进制文件时崩溃的问题
    - [模型] 修复名称包含点的提供商（如 z.ai）的环境变量名称无效问题
    - [模型] 修复 NVIDIA 提供商的 Qwen/DeepSeek/Kimi/Zhipu 模型推理参数
    - [模型] 修复从 Google API 获取的模型的 Google Gemini 网络搜索问题
    - [模型] 修复 Qwen3.5 模型检测以支持 3.9 系列
    - [更新器] 测试频道为空时回退到最新频道
    - [备份] 修复备份文件大小回归问题（现使用最小压缩）

    💄 改进
    - [UI] 修复 macOS 自定义标题栏中红绿灯控件对齐问题

    ⚡ 性能优化
    - [备份] 优化备份压缩级别以加快备份速度
    <!--LANG:END-->
